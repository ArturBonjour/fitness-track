version: '3.8'

services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongodata:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      MONGO_URI: mongodb://mongo:27017/fitness-tracker
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      NODE_ENV: production
      PORT: 5001
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongodata:
